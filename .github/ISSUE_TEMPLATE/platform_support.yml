name: Platform / Terminal Support
description: Request support for a new terminal, OS, or report platform-specific issues
title: "[Platform]: "
labels: ["platform"]
body:
  - type: markdown
    attributes:
      value: |
        Want us to support a new terminal or platform? Or having a platform-specific issue?

  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - New terminal support (click-to-focus)
        - New OS / architecture support
        - New desktop environment support (Linux)
        - Platform-specific bug
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform details
      description: OS, version, architecture, desktop environment (Linux)
      placeholder: "e.g. Fedora 41 x64, KDE Plasma 6.2"
    validations:
      required: true

  - type: input
    id: terminal-name
    attributes:
      label: Terminal name and version
      placeholder: "e.g. foot 1.18.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see supported? Or describe the platform-specific issue.
    validations:
      required: true

  - type: textarea
    id: terminal-info
    attributes:
      label: Terminal technical details
      description: |
        If requesting click-to-focus support, these details help a lot:
        - Is it X11, Wayland, or both?
        - Does it support window activation via CLI? (e.g. wmctrl, xdotool, D-Bus)
        - Does it have a unique window class or app ID?
        - Any known way to focus its window programmatically?
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.36.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
